name: Release - Publish

on:
  # Triggers when Version Packages PR is merged
  pull_request:
    branches: [main]
    types: [closed]
  # Manual trigger for retrying failed publishes
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "20"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    # Only run when a Version PR is merged, or on manual trigger
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.title, 'chore(release)'))

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Upgrade npm for OIDC
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          cd packages/icons && npm run build && cd ../..
          cd packages/thesvg && node scripts/build-reexports.mjs && cd ../..
          cd packages/cli && npm run build && cd ../..
          cd packages/mcp && npm run build && cd ../..
          cd packages/react && npm run build && cd ../..
          cd packages/vue && npm run build && cd ../..
          cd packages/svelte && npm run build && cd ../..

      - name: Publish to npm
        # pnpm changeset publish ships README.md inside the tarball but does
        # not populate the per-version `readme` field on the npm registry
        # manifest, which is what npmjs.com renders. To get both correct
        # readme rendering AND pnpm's workspace-protocol rewriting, we
        # `pnpm pack` each package (which rewrites `workspace:*` -> real
        # versions) and then `npm publish <tarball>` (which populates the
        # readme field on the registry manifest).
        run: |
          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            [ -f "$PKG_DIR/package.json" ] || continue
            PKG_NAME=$(node -p "require('./$PKG_DIR/package.json').name")
            PKG_VERSION=$(node -p "require('./$PKG_DIR/package.json').version")
            PKG_PRIVATE=$(node -p "require('./$PKG_DIR/package.json').private || false")
            if [ "$PKG_PRIVATE" = "true" ]; then
              echo "Skipping $PKG_NAME (private)"
              continue
            fi
            if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
              echo "Skipping $PKG_NAME@$PKG_VERSION (already published)"
              continue
            fi
            echo "Packing and publishing $PKG_NAME@$PKG_VERSION"
            (
              cd "$PKG_DIR"
              # pnpm pack rewrites workspace:* deps to concrete versions
              TARBALL=$(pnpm pack 2>/dev/null | tail -1)
              # npm publish populates the readme field on the registry manifest
              npm publish "$TARBALL" --access public --provenance
              rm -f "$TARBALL"
            )
          done

      - name: Create git tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Tag each package with its current version if not already tagged.
          #
          # The runner's checkout doesn't always fetch every historical
          # tag, so a local-only `git rev-parse` check would create a
          # duplicate tag and the subsequent push would be rejected by
          # the remote. Check both local and remote, and pull the tag
          # down if it already lives upstream - the downstream
          # "Create GitHub releases per package" step uses local
          # `git rev-parse` and needs the tag to exist in this clone.
          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            [ -f "$PKG_DIR/package.json" ] || continue
            PKG_NAME=$(node -p "require('./$PKG_DIR/package.json').name")
            PKG_VERSION=$(node -p "require('./$PKG_DIR/package.json').version")
            TAG="$PKG_NAME@$PKG_VERSION"
            if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag already present locally: $TAG"
            elif git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag already present on remote: $TAG (fetching)"
              # Use `tag` form rather than a refspec - scoped names contain
              # `@` which trips the `<src>:<dst>` parser.
              git fetch origin tag "$TAG"
            else
              echo "Creating tag: $TAG"
              git tag "$TAG"
              git push origin "$TAG"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub releases per package
        # Create one GitHub release per just-published package, with the
        # release body sourced from that package's CHANGELOG.md section
        # for the current version. This:
        #   1. Fires `on: release: published` for downstream automations
        #      (e.g. homebrew-tap-update, which gates on @thesvg/cli@*).
        #   2. Gives each package a discoverable release page on GitHub
        #      with the changeset entries that landed in that version.
        run: |
          # Note: deliberately not using `set -e`. We want one failing
          # release (e.g. flaky gh API) not to skip releases for every
          # later package. We track failures and exit non-zero at the
          # end so the workflow surfaces the problem.
          failed=()

          # Extract the section between `## <version>` and the next `## ` (or EOF)
          # from a changesets-generated CHANGELOG.md. Echoes nothing if the
          # section is absent.
          extract_section() {
            local file="$1" version="$2"
            awk -v ver="## ${version}" '
              $0 == ver { capture = 1; next }
              capture && /^## / { exit }
              capture { print }
            ' "$file"
          }

          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            [ -f "$PKG_DIR/package.json" ] || continue
            PKG_NAME=$(node -p "require('./$PKG_DIR/package.json').name")
            PKG_VERSION=$(node -p "require('./$PKG_DIR/package.json').version")
            PKG_PRIVATE=$(node -p "require('./$PKG_DIR/package.json').private || false")
            if [ "$PKG_PRIVATE" = "true" ]; then continue; fi

            TAG="$PKG_NAME@$PKG_VERSION"

            # Only create a release if the git tag exists (created above)
            # and the release doesn't already exist.
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Skipping $TAG (no git tag)"
              continue
            fi
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Skipping $TAG (release exists)"
              continue
            fi

            # Build release body from CHANGELOG.md section
            CHANGELOG="$PKG_DIR/CHANGELOG.md"
            BODY_FILE="$(mktemp)"
            {
              echo "## $PKG_NAME $PKG_VERSION"
              echo
              if [ -f "$CHANGELOG" ]; then
                SECTION=$(extract_section "$CHANGELOG" "$PKG_VERSION")
                if [ -n "$SECTION" ]; then
                  echo "$SECTION"
                else
                  echo "_No changelog entry found for version $PKG_VERSION._"
                fi
              else
                echo "_Package has no CHANGELOG.md._"
              fi
              echo
              echo "---"
              echo
              if [ "$PKG_NAME" = "@thesvg/cli" ]; then
                echo "Install: \`brew install glincker/thesvg/thesvg\` or \`npm i -g @thesvg/cli\`"
              else
                echo "Install: \`npm i $PKG_NAME@$PKG_VERSION\`"
              fi
              echo "Tarball: https://registry.npmjs.org/$PKG_NAME/-/$(basename $PKG_NAME)-$PKG_VERSION.tgz"
            } > "$BODY_FILE"

            echo "Creating GitHub release for $TAG"
            if gh release create "$TAG" \
                 --title "$PKG_NAME $PKG_VERSION" \
                 --notes-file "$BODY_FILE" \
                 --verify-tag; then
              echo "Created release $TAG"
            else
              echo "::error::failed to create release for $TAG"
              failed+=("$TAG")
            fi
            rm -f "$BODY_FILE"
          done

          if [ "${#failed[@]}" -gt 0 ]; then
            echo "::error::${#failed[@]} release(s) failed: ${failed[*]}"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
